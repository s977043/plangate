#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex config
# SSoT: docs/ai/project-rules.md（正本） → AGENTS.md（入口） → 本ファイル（Codex固有設定）

# --- Core settings ---
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# プロジェクトドキュメントのフォールバック順序
# Codex は instructions.md を優先読み込み。見つからない場合は AGENTS.md → CLAUDE.md の順で参照する
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md"]

# --- Features ---
[features]
multi_agent = true

# --- Agent orchestration ---
[agents]
max_threads = 4
# 意図的な制限: オーケストレーターから1段階のみ委譲可能（再帰的な多段委譲は不要）
max_depth = 1

# -- 計画・調整 --

[agents.orchestrator]
config_file = "agents/orchestrator.toml"

[agents.project_planner]
config_file = "agents/project_planner.toml"

[agents.workflow_conductor]
config_file = "agents/workflow_conductor.toml"

# -- コンテンツ作成 --

[agents.documentation_writer]
config_file = "agents/documentation_writer.toml"

[agents.skill_designer]
config_file = "agents/skill_designer.toml"

# -- レビュー --

[agents.claude_code_reviewer]
config_file = "agents/claude_code_reviewer.toml"

# -- 実装・品質 --

[agents.implementer]
config_file = "agents/implementer.toml"

[agents.acceptance_tester]
config_file = "agents/acceptance_tester.toml"

[agents.code_optimizer]
config_file = "agents/code_optimizer.toml"

[agents.linter_fixer]
config_file = "agents/linter_fixer.toml"

# -- 調査・分析 --

[agents.research_analyst]
config_file = "agents/research_analyst.toml"

[agents.retrospective_analyst]
config_file = "agents/retrospective_analyst.toml"

# -- 要件・仕様 --

[agents.spec_writer]
config_file = "agents/spec_writer.toml"

# -- レビュー・改善 --

[agents.prompt_engineer]
config_file = "agents/prompt_engineer.toml"

[agents.migration_agent]
config_file = "agents/migration_agent.toml"

# -- アジャイル --

[agents.scrum_master]
config_file = "agents/scrum_master.toml"

[agents.agile_coach]
config_file = "agents/agile_coach.toml"

# -- 調査 --

[agents.explorer_agent]
config_file = "agents/explorer_agent.toml"

# -- v7 ハイブリッドアーキテクチャ（責務ベース） --
# docs/plangate-v7-hybrid.md / .claude/rules/hybrid-architecture.md 参照
# orchestrator は汎用マルチエージェント調整と v7 実行層総責任者の両方を兼務

[agents.requirements_analyst]
config_file = "agents/requirements_analyst.toml"

[agents.solution_architect]
config_file = "agents/solution_architect.toml"

[agents.implementation_agent]
config_file = "agents/implementation_agent.toml"

[agents.qa_reviewer]
config_file = "agents/qa_reviewer.toml"

# --- Shell environment ---
[shell_environment_policy]
# Minimal env vars for basic shell operation. Secrets are excluded intentionally.
include_only = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL"]
