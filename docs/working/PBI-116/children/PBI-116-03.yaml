child_pbi:
  id: PBI-116-03
  parent_id: PBI-116
  title: Prompt assembly を Core / Phase / Risk / Model Adapter に分層化
  goal: プロンプトを 4 層で組み立てる設計にし、Core Contract を共通化、モデル差分は薄い adapter に閉じる
  user_value: モデル変更時にも Core を fork せず、保守と検証が独立した責務単位で進められる
  in_scope:
    - Prompt assembly 4 層の定義（base_contract / phase_contract / risk_mode_contract / model_adapter）
    - 各層の責務定義（PlanGate 不変 / phase 別成功条件 / mode 別検証深度 / モデル別補正）
    - Phase contract の定義（classify / plan / approve-wait / execute / review / verify / handoff）
    - Model adapter の定義（outcome_first / outcome_first_strict / explicit_short / legacy_or_unknown）
    - 解決ロジックの実装または擬似コード提示（TypeScript / shell / docs いずれか）
  out_of_scope:
    - 各モデル別の完全 prompt fork
    - Provider runtime の全面刷新
    - eval runner の実装（PBI-116-05 で対応）
    - 実際の AI API 呼び出し統合
  # PBI-116-04 (Structured Outputs) には意図的に依存しない:
  # Prompt assembly の 4 層は Core Contract + Model Profile を統合するもので、
  # Structured Outputs schema は出力契約として独立。両者は並行実行可能。
  # 将来 prompt assembly が JSON 出力を要求する場合は別 PBI で対応する。
  dependencies:
    - PBI-116-01
    - PBI-116-02
  parallelizable: false
  allowed_files:
    - docs/ai/prompt-assembly.md
    - docs/ai/contracts/**
    - docs/ai/adapters/**
    - bin/plangate-prompt-assemble
    - schemas/prompt-context.schema.json
    - docs/working/TASK-0043/**  # workflow 管理成果物（plan/todo/test-cases/review/status/handoff/evidence、C-2 EX-03-02 対応）
  forbidden_files:
    - CLAUDE.md
    - AGENTS.md
    - .claude/rules/**
    - .claude/commands/**
    - .claude/agents/**
    - plugin/plangate/**
    - .github/workflows/**
    - docs/ai/model-profiles.yaml
  acceptance_criteria:
    - prompt assembly が Core / Phase / Risk / Model Adapter の 4 層として定義されている
    - 各層の責務境界がドキュメント化されている
    - plan / exec / review / handoff の phase contract が定義されている
    - outcome_first / explicit_short / legacy_or_unknown の model adapter が定義されている
    - モデル別 prompt full fork を避ける方針が明記されている
    - 既存の .claude/ と plugin の両方に適用できる構造になっている
  required_checks:
    - lint
    - markdown-lint
  pr_strategy:
    branch: feat/PBI-116-03-prompt-assembly
    pr_size: medium
    merge_after:
      - PBI-116-01
      - PBI-116-02
  covers_parent_ac:
    - parent-AC-3
  mode: high-risk
  risk:
    level: high
    domains:
      - prompt-engineering
      - architecture
    mitigation: |-
      PBI-116-01（Core Contract）と PBI-116-02（Model Profile）の成果物を引用するため、
      両者の C-4 マージ後に着手。設計層のため C-2 外部AIレビュー必須。
  state: done  # PR #147 (f854d09) マージ完了、PBI-116 Phase 3 完了 2026-04-30
